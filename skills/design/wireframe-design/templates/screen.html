<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- TODO: タイトルを「プロジェクト名 — NN 画面名（状態）」に -->
  <title>PJ名 — ① 画面名（状態）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- アイコン: Iconify。<iconify-icon icon="lucide:..."> で使う。色/サイズは Tailwind の text-* が効く（既定 1em・currentColor）。 -->
  <script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
  <style>
    body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; }
    .note { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    /* デバイス枠プリセット。枠クラスを1つ選び、レイアウトと注釈幅も枠に合わせる。
       - phone : 縦1カラム。注釈は max-w-[375px]
       - tablet: 1〜2カラム
       - desktop: サイドナビ＋本体の2ペイン / テーブル等。注釈は max-w-[640px] 程度 */
    .device-phone   { width: 375px;  height: 760px;  border-radius: 2.5rem; border-width: 8px; }
    .device-tablet  { width: 768px;  height: 1024px; border-radius: 1.5rem; border-width: 10px; }
    .device-desktop { width: 1280px; height: 800px;  border-radius: 0.75rem; border-width: 1px; }
    /* プレースホルダ用の斜線ハッチ（画像・未確定領域に使う） */
    .ph { background-image: repeating-linear-gradient(45deg, #eee 0 8px, #e4e4e7 8px 16px); }
  </style>
</head>
<!-- デスクトップ/Web 向け雛形（サイドナビ＋本体の2ペイン）。モバイル案件は screen-phone.html を複製すること。 -->
<!-- 低忠実度: 配色は neutral のまま。構造と要素の有無に集中する。 -->
<body class="bg-neutral-200 text-neutral-800 p-8">

  <!-- ヘッダ: 一覧への戻り導線 + 画面名 + 仕様への相互リンク -->
  <header class="mb-8 max-w-7xl mx-auto">
    <p class="text-sm text-neutral-500 mb-1"><a href="index.html" class="underline">← ワイヤーフレーム一覧</a></p>
    <h1 class="text-2xl font-bold">① 画面名（状態）</h1>
    <p class="text-sm text-neutral-600 mt-1">
      低忠実度。配色・タイポは<strong>未確定</strong>で、構造と要素の有無のみを示す。
      仕様: <span class="note">../../1_spec/xxxx.md</span>
    </p>
  </header>

  <!-- 同一画面の「画面レベル状態」を見比べるときは <section> を複製して横並び（flex-wrap が効く）。
       例: 通常 / 空 / 失敗 を3フレーム。要素レベル状態（入力エラー・モーダル）は1フレーム内で表現する。 -->
  <div class="flex flex-wrap gap-10 justify-center items-start max-w-7xl mx-auto">
    <section>
      <!-- ▼ 枠クラスを1つ選ぶ: device-phone / device-tablet / device-desktop
           枠は W×H 固定の箱。flex-1/w-full で潰さない・高さを中身任せにしない。
           中身は下の flex-1 overflow-y-auto で「枠の中だけ」スクロールさせる。 -->
      <div class="device-desktop relative bg-white border-neutral-800 shadow-xl overflow-hidden flex">

        <!-- 共通ナビ（グローバルナビ）。低忠実度では DRY より閲覧性優先で各フレームにコピーしてよい。
             phone の場合はこのサイドナビを下部タブ等に置き換える。 -->
        <nav class="w-44 shrink-0 border-r border-neutral-200 p-3 space-y-1 text-sm">
          <div class="font-bold mb-2">PJ名</div>
          <a href="01-screen-a.html" class="flex items-center gap-2 rounded px-2 py-1 bg-neutral-100">
            <iconify-icon icon="lucide:book-open"></iconify-icon>画面A
          </a>
          <a href="02-next-screen.html" class="flex items-center gap-2 rounded px-2 py-1 hover:bg-neutral-100">
            <iconify-icon icon="lucide:list"></iconify-icon>画面B
          </a>
        </nav>

        <!-- 本体 -->
        <div class="flex-1 flex flex-col">
          <!-- ヘッダ領域 -->
          <div class="px-5 pt-4 pb-3 border-b border-neutral-200">
            <h3 class="text-xl font-bold">画面タイトル</h3>
            <p class="text-[11px] text-neutral-400">補助情報・並び順など</p>
          </div>

          <!-- コンテンツ領域: 溢れる場合は overflow-y-auto で枠内スクロール -->
          <div class="flex-1 overflow-y-auto p-4 space-y-3">
            <!-- 別画面へ遷移する要素は goTo() でクリック可能に -->
            <button onclick="goTo('02-next-screen.html', { id: '123' })"
                    class="w-full text-left bg-neutral-100 rounded-lg px-4 py-3 active:opacity-60">
              リスト項目（クリックで次画面へ）
            </button>

            <!-- 要素レベル状態の例①: 入力エラーは別フレームにせず、同一フレーム内に併記する -->
            <div>
              <input class="w-full border border-red-400 rounded px-3 py-2" placeholder="数量" />
              <p class="text-[11px] text-red-500 mt-1">在庫を超えています（要素レベル状態 = 同一フレーム内）</p>
            </div>

            <!-- 要素レベル状態の例②: モーダル/トースト等の遷移を伴わない状態は JS で開閉 -->
            <button onclick="document.getElementById('modal').classList.toggle('hidden')"
                    class="text-sm underline text-neutral-500">確認モーダルを開く</button>

            <!-- 画像・未確定領域はハッチで示す -->
            <div class="ph aspect-video rounded-lg border border-neutral-300"></div>
          </div>
        </div>

        <!-- モーダル（既定は hidden。遷移しない状態変化の見せ方の雛形） -->
        <div id="modal" class="hidden absolute inset-0 bg-black/30 flex items-center justify-center">
          <div class="bg-white rounded-xl p-5 w-72 shadow-xl">
            <p class="font-medium mb-3">確認しますか？</p>
            <div class="flex justify-end gap-2">
              <button onclick="document.getElementById('modal').classList.add('hidden')" class="px-3 py-1 text-sm">キャンセル</button>
              <button class="px-3 py-1 text-sm bg-neutral-800 text-white rounded">OK</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 注釈: この画面/状態の要素ルールを 1〜3 行で。monospace。幅は枠に合わせる（phone なら max-w-[375px]）。 -->
      <p class="note text-[11px] text-neutral-500 mt-2 max-w-[640px]">
        ・この状態で出す/出さない要素のルールを書く<br>
        ・画面レベル状態（空/読込中/失敗/権限なし）は別フレームに分ける<br>
        ・要素レベル状態（入力エラー/モーダル/トースト）は同一フレーム内で表現する
      </p>
    </section>
  </div>

  <script>
    // 画面遷移ヘルパ: クエリで簡易にパラメータを渡してクリック遷移を再現する
    function goTo(href, params) {
      const qs = params ? '?' + new URLSearchParams(params).toString() : '';
      window.location.href = href + qs;
    }
  </script>

</body>
</html>
